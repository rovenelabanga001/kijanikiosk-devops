name: Basic CI

on:
  push:
    branches: ["master"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required files
        run: |
          test -f README.md
          test -f notes.md
          test -f RUNBOOK.md
          echo "Repository validation successfull"
